#### This is the child pipeline that is integrated in the main pipeline .gitlab-ci.yml. This will run as a separate pipeline and
#### in its own separate container, separate from the deploy pipeline container. This runs a native pytest image and pytest is 
#### added with pip install. 
#### There is no nded to COPY or mount the repo as gitlab does that automatically for every job container
#### by default. The deploy pipeline required a specific COPY of a subdirectory of the root repo directory and thus requires a 
#### COPY command in the docker image that it uses (build push and deploy). This pytest pipeline will run the pytest test file in 
#### the tests directory off the root of the repo by using the default mount that gitlab does for all containers. 
#### pytest -v -s --capture=no tests/test_ai_hook_v7.py | tee pytest-report.log  <<< the logs will be piped to a log file and 
#### these will be in the artifact logs for the child pipeline which can be downloaded in the Gitabl web console.

stages:
  - pytest

pytest_job:
  stage: pytest
  image: python:3.12
  tags:
    - docker1   #### added the tag docker in the /etc/gitlab-runner/config.toml file for the docker executor. Make sure to use docker1 here. this is for the docker executor of instance type (not project or group type)
  
      #script:
      #  - pip install PyYAML==6.0.1 ## the PyYAML 6.0 dependency has trouble with installing on 3.12, so hardcode override this one.
      #  - pip install -r aws_boto3_modular_multi_processing/requirements.txt ## the pytest requires all python depenedencies that the actual deployment scripts rdquire. This docker container for the pytest suite is bare bones and we need to add them to it.
      #  - pip install pytest
      #  - pytest -v -s --capture=no tests/test_ai_hook_v7.py | tee pytest-report.log
 

  script:
    - pip install pytest
    - pip install \
        ansible==10.3.0 \
        ansible-core==2.17.9 \
        apprise==1.1.0 \
        bcrypt==4.3.0 \
        boto3==1.37.7 \
        botocore==1.37.7 \
        certifi==2022.9.24 \
        cffi==1.17.1 \
        charset-normalizer==2.1.1 \
        click==8.1.3 \
        cryptography==44.0.2 \
        idna==3.4 \
        importlib-metadata==5.0.0 \
        Jinja2==3.1.6 \
        jmespath==1.0.1 \
        Markdown==3.4.1 \
        MarkupSafe==3.0.2 \
        mysql-connector-python==8.0.31 \
        oauthlib==3.2.1 \
        packaging==24.2 \
        paramiko==3.5.1 \
        protobuf==3.20.1 \
        psutil==5.9.8 \
        pycparser==2.22 \
        PyNaCl==1.5.0 \
        python-dateutil==2.9.0.post0 \
        python-dotenv==0.21.0 \
        PyYAML==6.0.1 \
        requests==2.28.1 \
        requests-oauthlib==1.3.1 \
        resolvelib==1.0.1 \
        s3transfer==0.11.4 \
        six==1.17.0 \
        tabulate==0.9.0 \
        urllib3==1.26.12 \
        zipp==3.9.0
    - pytest -v -s --capture=no tests/test_ai_hook_v7.py | tee pytest-report.log

  artifacts:
    when: always
    paths:
      - pytest-report.log
  only:
    - main
    - merge_requests
#### This will run on both merge_requests and on push requests.

#### note that this uses the docker executor gitlab runner,  but it was found that project level executor had lots of issues.
#### Thus a new docker executor of instance type was created for this and it is working fine. Since this executor is being used
#### for a child pipeline make sure it it can run on protected branches. Since this is instance type gitlab docker executor 
#### runner it is automatically available for this (and all other) project.

